<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rocket Racing - Live</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="stxt">Menghubungkan...</span>
    <span id="lgift"></span>
  </div>

  <!-- WINNER BAR -->
  <div id="winner-bar">
    <span style="font-size:22px">&#127942;</span>
    <div>
      <div class="wname" id="wname">-</div>
      <div class="wsub" id="wsub">-</div>
    </div>
    <span style="font-size:22px">&#127942;</span>
  </div>

  <!-- SCOREBOARD -->
  <div id="scoreboard"></div>

  <!-- TRACK -->
  <div class="track-container">
    <div class="star-bg"></div>
    <div class="splines" id="splines"></div>
    <div class="track" id="track"></div>
    <div id="demo-panel">
      <div class="dlabel">TEST MANUAL</div>
      <div class="dbtns" id="dbtns"></div>
    </div>
  </div>

  <!-- GIFT NOTIFY -->
  <div id="gnotify">
    <div class="gnu" id="gnu">-</div>
    <div class="gng" id="gng">-</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
